profiles:
  - unit
verify_groups:
  framework_detectors:
    - "go test ./internal/project -run Framework -v"
  init_integration:
    - "go test ./internal/cli -run 'Init.*Framework|InitHelpIncludesFramework' -v"
  documentation:
    - "go run ./cmd/thanos help | rg -- '--framework'"
    - "go test ./internal/cli -run '^TestFrameworkDocumentation$' -v"
  architecture_guards:
    - "! rg -n '\"net(/http)?\"|\"os/exec\"' internal/project"
    - "git diff --exit-code -- internal/state internal/orchestrator"
  repository_regression:
    - "test -z \"$(gofmt -l internal/model/model.go internal/project/project.go internal/project/project_test.go internal/cli/cli.go internal/cli/cli_test.go)\""
    - "go mod tidy && git diff --exit-code -- go.mod go.sum"
    - "go test ./..."
