chunks:
  - index: 1
    id: ec-1-project-workflow-contract
    title: Apply project workflow contract
    description: Update the workflow model, prompts, evidence gates, compatibility migration, CLI, TUI, documentation, and memory.
    objective: Enforce QA planning, development, independent review, EC and smoke testing, and completion without rounds.
    scope:
      - internal/model
      - internal/state
      - internal/orchestrator
      - internal/workspace
      - internal/cli
      - internal/prompts
      - internal/tui
      - README.md
      - README.vi.md
      - Technical.md
    acceptance:
      - New tickets run planning, development, review, and testing in order.
      - Failed review or testing reopens development without creating a numeric round.
      - Workflow prompts create the required plan, implementation, review, EC, smoke-test, and memory evidence.
      - Work items use names such as Feature 001-EC1 Implement ABC instead of round labels.
      - Existing round-based artifacts can resume through a non-destructive compatibility migration.
    priority: high
    complexity: large
    owner_role: coder
    risks:
      - Existing state and artifact compatibility
      - Infinite retry loops after failed gates
      - Prompt and runtime artifact paths becoming inconsistent
    status: active
